<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Couple App</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

html,body{
margin:0;
height:100dvh;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont;
background:#0b0f1a;
color:white;
}

/* INPUT ZOOM FIX (CRITICAL) */
input{
font-size:16px;
}

/* SELECT */
#select{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background:#0b0f1a;
z-index:999;
}

.cardRow{display:flex;gap:20px;}
.card{
width:140px;
padding:20px;
border-radius:16px;
background:rgba(255,255,255,0.08);
cursor:pointer;
text-align:center;
}

/* APP */
#app{display:none;height:100vh;}

/* MENU */
#menuBtn{
position:fixed;
top:10px;
left:10px;
z-index:3000;
padding:8px 12px;
background:rgba(255,255,255,0.12);
border-radius:10px;
cursor:pointer;
}

#sideMenu{
position:fixed;
top:0;
left:-300px;
width:280px;
height:100%;
background:#111827;
z-index:2500;
padding:15px;
transition:0.3s;
overflow:auto;
}

#sideMenu.open{left:0;}

/* CHAT */
#chat{
height:100%;
display:flex;
flex-direction:column;
padding:12px;
}

#messages{
flex:1;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
padding:40px 4px 140px 4px;
}

/* GREEN CHAT */
.msgRow{display:flex;flex-direction:column;max-width:80%;}
.left{align-self:flex-start;}
.right{align-self:flex-end;}

.name{font-size:11px;opacity:0.6;margin:0 6px 2px 6px;}

.bubble{
padding:12px 14px;
border-radius:18px;
background:rgba(34,197,94,0.25);
border:1px solid rgba(34,197,94,0.4);
word-wrap:break-word;
}

.meBubble{background:rgba(34,197,94,0.45);}

/* INPUT BAR (SAFE MOBILE FIX) */
#inputBar{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
gap:10px;
padding:10px;
padding-bottom:calc(10px + env(safe-area-inset-bottom));
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:3000;
}

input{
flex:1;
padding:14px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.12);
color:white;
outline:none;
}

button{
padding:12px 16px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
cursor:pointer;
}

/* TYPING FIX */
#typing{
position:fixed;
bottom:80px;
left:10px;
right:10px;
z-index:2000;
}

.hidden{display:none;}

.typingBox{
display:flex;
gap:8px;
align-items:center;
padding:10px;
background:rgba(255,255,255,0.10);
border-radius:18px;
width:fit-content;
font-size:13px;
}

/* STATUS */
#statusBox{
position:fixed;
top:10px;
right:10px;
z-index:3000;
padding:6px 10px;
border-radius:999px;
background:rgba(255,255,255,0.12);
font-size:12px;
}

/* GAME */
#gameBox{
margin-top:20px;
padding:10px;
background:rgba(255,255,255,0.08);
border-radius:10px;
}

#hangWord{
font-size:22px;
letter-spacing:6px;
margin:10px 0;
}

#turnInfo{
font-size:13px;
opacity:0.8;
}
</style>
</head>

<body>

<div id="menuBtn">☰ Menü</div>

<div id="sideMenu">
<h3>📌 Menü</h3>

<div id="gameBox">
<h4>🪢 Adam Asmaca</h4>

<div id="turnInfo">Sıra: ...</div>

<div id="hangWord">_ _ _ _</div>
<div id="hangLives">❤️❤️❤️❤️❤️</div>

<input id="letter" maxlength="1" placeholder="Harf">
<button onclick="guess()">Tahmin</button>

<p id="gameInfo"></p>
</div>

</div>

<div id="select">
<h2>💜 Couple App</h2>
<div class="cardRow">
<div class="card" onclick="selectUser('Melek')">👼 Melek</div>
<div class="card" onclick="selectUser('Gökhan')">😎 Gökhan</div>
</div>
</div>

<div id="app">

<div id="statusBox">...</div>

<div id="chat">
<div id="messages"></div>

<div id="typing" class="hidden">
<div class="typingBox">
<span id="typingText"></span>
</div>
</div>

</div>

<div id="inputBar">
<input id="text" placeholder="Mesaj yaz...">
<button id="sendBtn">➤</button>
</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
push,
set,
onValue,
onDisconnect
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBAvlyYU3xJcCJg3sxpv84QcqHhHsc",
authDomain:"contact-23b7b.firebaseapp.com",
databaseURL:"https://contact-23b7b-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

let room="test";
let user="";

const chatRef = ref(db,"rooms/"+room+"/chat");
const gameRef = ref(db,"rooms/"+room+"/game");

/* SELECT */
window.selectUser=function(u){
user=u;

document.getElementById("select").style.display="none";
document.getElementById("app").style.display="block";

/* ONLINE */
set(ref(db,"rooms/"+room+"/presence/"+user),{online:true});
onDisconnect(ref(db,"rooms/"+room+"/presence/"+user)).set({online:false});

/* INIT GAME */
set(gameRef,{
word:"istanbul",
lives:5,
turn:"Melek",
display:Array(9).fill("_")
});

listenChat();
listenGame();
}

/* CHAT */
function listenChat(){
onValue(chatRef,(snap)=>{
let data=snap.val();
let box=document.getElementById("messages");
box.innerHTML="";
if(!data) return;

Object.values(data).forEach(m=>{
let row=document.createElement("div");
row.className="msgRow "+(m.u===user?"right":"left");

row.innerHTML=`
<div class="name">${m.u}</div>
<div class="bubble ${m.u===user?"meBubble":""}">${m.m}</div>
`;

box.appendChild(row);
});

box.scrollTop=box.scrollHeight;
});
}

/* SEND */
document.getElementById("sendBtn").onclick=()=>{
let t=document.getElementById("text").value.trim();
if(!t)return;

push(chatRef,{u:user,m:t});
document.getElementById("text").value="";
};

/* TYPING */
document.getElementById("text").addEventListener("input",()=>{

set(ref(db,"rooms/"+room+"/typing/"+user),{t:true});

clearTimeout(window.tp);
window.tp=setTimeout(()=>{
set(ref(db,"rooms/"+room+"/typing/"+user),{t:false});
},800);
});

onValue(ref(db,"rooms/"+room+"/typing"),(snap)=>{
let d=snap.val()||{};
let other=Object.keys(d).find(k=>k!==user && d[k].t);

let box=document.getElementById("typing");
let text=document.getElementById("typingText");

if(!other){
box.classList.add("hidden");
return;
}

box.classList.remove("hidden");
text.innerText=other+" yazıyor...";
});

/* GAME */
function listenGame(){
onValue(gameRef,(snap)=>{
let g=snap.val();
if(!g) return;

window.game=g;

document.getElementById("hangWord").innerText=g.display.join(" ");
document.getElementById("hangLives").innerText="❤️".repeat(g.lives);
document.getElementById("turnInfo").innerText="Sıra: "+g.turn;
});
}

window.guess=function(){
let l=document.getElementById("letter").value.toLowerCase();
if(!l||!game)return;

if(game.turn!==user){
document.getElementById("gameInfo").innerText="Sıra sende değil!";
return;
}

let found=false;

for(let i=0;i<game.word.length;i++){
if(game.word[i]===l){
game.display[i]=l;
found=true;
}
}

if(!found) game.lives--;

game.turn = game.turn==="Melek"?"Gökhan":"Melek";

set(gameRef,game);

document.getElementById("letter").value="";
};

</script>

</body>
</html>
