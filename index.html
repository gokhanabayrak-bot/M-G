<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Couple App</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

html,body{
margin:0;
height:100%;
width:100%;
overflow:hidden;
position:fixed;
font-family:-apple-system,BlinkMacSystemFont;
background:#0b0f1a;
color:white;
}

/* SELECT */
#select{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background:#0b0f1a;
z-index:999;
}

.cardRow{display:flex;gap:20px;}

.card{
width:140px;
padding:20px;
border-radius:16px;
background:rgba(255,255,255,0.08);
cursor:pointer;
text-align:center;
}

/* APP */
#app{display:none;height:100vh;position:relative;}

#chat{
height:100%;
display:flex;
flex-direction:column;
padding:12px;
}

#messages{
flex:1;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
padding:10px 4px 120px 4px;
}

/* MESSAGE */
.msgRow{
display:flex;
flex-direction:column;
max-width:80%;
}

.left{align-self:flex-start;}
.right{align-self:flex-end;}

.name{
font-size:11px;
opacity:0.6;
margin:0 6px 2px 6px;
}

.bubble{
padding:12px 14px;
border-radius:18px;
font-size:15px;
line-height:1.3;
word-wrap:break-word;
}

.meBubble{
background:linear-gradient(135deg,#3b82f6,#60a5fa);
border-bottom-right-radius:6px;
}

.otherBubble{
background:rgba(255,255,255,0.10);
border-bottom-left-radius:6px;
}

/* TYPING */
#typingContainer{
position:fixed;
bottom:80px;
left:10px;
right:10px;
z-index:50;
}

.hidden{display:none;}

.typingBubble{
display:flex;
align-items:center;
gap:8px;
font-size:13px;
opacity:0.9;
padding:10px 12px;
border-radius:18px;
background:rgba(255,255,255,0.10);
width:fit-content;
backdrop-filter:blur(10px);
}

.dots span{
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:0.3;
display:inline-block;
animation:bounce 1.2s infinite;
margin-right:3px;
}

.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}

@keyframes bounce{
0%,80%,100%{transform:translateY(0);opacity:0.3;}
40%{transform:translateY(-5px);opacity:1;}
}

/* INPUT */
#inputBar{
position:fixed;
bottom:10px;
left:10px;
right:10px;
display:flex;
gap:10px;
padding:10px;
border-radius:16px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
z-index:60;
}

input{
flex:1;
padding:14px;
font-size:16px;
border:none;
border-radius:12px;
outline:none;
background:rgba(255,255,255,0.12);
color:white;
}

#sendBtn{
padding:12px 16px;
border:none;
border-radius:12px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
}

/* STATUS */
#statusBox{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
padding:8px 14px;
border-radius:999px;
background:rgba(255,255,255,0.12);
font-size:12px;
z-index:100;
}

.onlineDot{
width:8px;
height:8px;
border-radius:50%;
background:#22c55e;
display:inline-block;
margin-right:6px;
}

</style>
</head>

<body>

<div id="select">
<h2>💜 Couple App</h2>
<div class="cardRow">
<div class="card" onclick="selectUser('Melek')">👼 Melek</div>
<div class="card" onclick="selectUser('Gökhan')">😎 Gökhan</div>
</div>
</div>

<div id="app">

<div id="statusBox">durum...</div>

<div id="chat">
<div id="messages"></div>
</div>

<div id="typingContainer" class="hidden">
  <div class="typingBubble">
    <span id="typingText">Yazıyor</span>
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<div id="inputBar">
<input id="text" placeholder="Mesaj yaz...">
<button id="sendBtn">➤</button>
</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
push,
onValue,
set,
onDisconnect
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBAvlyYU3xJcCJg3sxpv84QcqHhHsc",
authDomain:"contact-23b7b.firebaseapp.com",
databaseURL:"https://contact-23b7b-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

let room="test";
let user="";

const msgRef = ref(db,"rooms/"+room+"/chat");
const presenceRef = (u)=>ref(db,"rooms/"+room+"/presence/"+u);
const typingRef = (u)=>ref(db,"rooms/"+room+"/typing/"+u);

/* SELECT */
window.selectUser=function(u){

user=u;

document.getElementById("select").style.display="none";
document.getElementById("app").style.display="block";

/* presence */
set(presenceRef(user),{online:true,lastSeen:Date.now()});

onDisconnect(presenceRef(user)).set({online:false,lastSeen:Date.now()});

let other = user==="Melek" ? "Gökhan" : "Melek";
listenPresence(other);
listenTyping(other);
}

/* CHAT */
onValue(msgRef,(snap)=>{
let data=snap.val();
let box=document.getElementById("messages");
box.innerHTML="";
if(!data) return;

Object.values(data).forEach(m=>{

let row=document.createElement("div");
row.className="msgRow "+(m.u===user?"right":"left");

let name=document.createElement("div");
name.className="name";
name.innerText=m.u;

let bubble=document.createElement("div");
bubble.className="bubble "+(m.u===user?"meBubble":"otherBubble");
bubble.innerText=m.m;

row.appendChild(name);
row.appendChild(bubble);

box.appendChild(row);
});

setTimeout(()=>{
box.scrollTop=box.scrollHeight;
},50);

});

/* SEND */
function send(){
let t=document.getElementById("text").value.trim();
if(!t || !user) return;

push(msgRef,{u:user,m:t});
document.getElementById("text").value="";
}

document.getElementById("sendBtn").onclick=send;

document.getElementById("text").addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

/* 🔥 WORKING TYPING (FINAL FIX) */
document.getElementById("text").addEventListener("input",()=>{

if(!user) return;

set(typingRef(user),{
t:Date.now()
});

clearTimeout(window.typingTimer);

window.typingTimer=setTimeout(()=>{
set(typingRef(user),{
t:0
});
},800);

});

/* LISTEN TYPING */
function listenTyping(other){

const box=document.getElementById("typingContainer");
const text=document.getElementById("typingText");

onValue(typingRef(other),(s)=>{
let d=s.val();

if(!d || !d.t || d.t===0){
box.classList.add("hidden");
return;
}

let diff = Date.now() - d.t;

if(diff < 2500){
box.classList.remove("hidden");
text.innerText = other + " yazıyor";
}else{
box.classList.add("hidden");
}

});

}

/* PRESENCE */
function listenPresence(other){

onValue(presenceRef(other),(s)=>{
let d=s.val();
let box=document.getElementById("statusBox");

if(!d){
box.innerHTML="⚪ "+other+" bilinmiyor";
return;
}

box.innerHTML = d.online
? '<span class="onlineDot"></span>'+other+" çevrimiçi"
: "⏱ "+other+" offline";

});

}

</script>

</body>
</html>
