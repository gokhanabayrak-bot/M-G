<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Couple App</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont;
background:#0b0f1a;
color:white;
}

/* SELECT */
#select{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background:#0b0f1a;
z-index:999;
}

.cardRow{display:flex;gap:20px;}
.card{
width:140px;
padding:20px;
border-radius:16px;
background:rgba(255,255,255,0.08);
cursor:pointer;
text-align:center;
}

/* APP */
#app{display:none;height:100vh;}

/* MENU */
#menuBtn{
position:fixed;
top:10px;
left:10px;
z-index:3000;
padding:8px 12px;
background:rgba(255,255,255,0.12);
border-radius:10px;
cursor:pointer;
}

#sideMenu{
position:fixed;
top:0;
left:-300px;
width:280px;
height:100%;
background:#111827;
z-index:2500;
padding:15px;
transition:0.3s;
overflow:auto;
}

#sideMenu.open{left:0;}

.menuTitle{font-size:18px;margin-bottom:10px;}

#memoryInput{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-bottom:10px;
}

#addMemory{
width:100%;
padding:10px;
background:#3b82f6;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

.memoryItem{
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:10px;
margin-top:10px;
}

.memoryHeader{
font-size:12px;
opacity:0.7;
margin-bottom:5px;
}

/* CHAT */
#chat{
height:100%;
display:flex;
flex-direction:column;
padding:12px;
}

#messages{
flex:1;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
padding:40px 4px 90px 4px;
}

.msgRow{display:flex;flex-direction:column;max-width:80%;}
.left{align-self:flex-start;}
.right{align-self:flex-end;}

.name{font-size:11px;opacity:0.6;margin:0 6px 2px 6px;}

.bubble{
padding:12px 14px;
border-radius:18px;
background:rgba(255,255,255,0.10);
}

.meBubble{
background:linear-gradient(135deg,#3b82f6,#60a5fa);
}

/* typing */
#typing{padding:6px 10px;}
.hidden{display:none;}

.typingBox{
display:flex;
gap:8px;
align-items:center;
padding:10px;
background:rgba(255,255,255,0.10);
border-radius:18px;
width:fit-content;
font-size:13px;
}

/* INPUT */
#inputBar{
position:fixed;
bottom:10px;
left:10px;
right:10px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.12);
color:white;
}

button{
padding:12px 16px;
border:none;
border-radius:12px;
background:#3b82f6;
color:white;
cursor:pointer;
}

/* STATUS */
#statusBox{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
padding:8px 14px;
background:rgba(255,255,255,0.12);
border-radius:999px;
font-size:12px;
}
.onlineDot{
width:8px;height:8px;border-radius:50%;
background:#22c55e;
display:inline-block;
margin-right:6px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menuBtn">☰ Menü</div>

<div id="sideMenu">
<div class="menuTitle">📌 Anı Kutusu</div>

<input id="memoryInput" placeholder="Bugünkü anını yaz...">
<button id="addMemory">Ekle</button>

<div id="memoryList"></div>
</div>

<!-- SELECT -->
<div id="select">
<h2>💜 Couple App</h2>
<div class="cardRow">
<div class="card" onclick="selectUser('Melek')">👼 Melek</div>
<div class="card" onclick="selectUser('Gökhan')">😎 Gökhan</div>
</div>
</div>

<!-- APP -->
<div id="app">

<div id="statusBox">...</div>

<div id="chat">
<div id="messages"></div>

<div id="typing" class="hidden">
<div class="typingBox">
<span id="typingText"></span>
</div>
</div>

</div>

<div id="inputBar">
<input id="text" placeholder="Mesaj yaz...">
<button id="sendBtn">➤</button>
</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
push,
onValue,
set,
onDisconnect
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBAvlyYU3xJcCJg3sxpv84QcqHhHsc",
authDomain:"contact-23b7b.firebaseapp.com",
databaseURL:"https://contact-23b7b-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

let room="test";
let user="";

const msgRef = ref(db,"rooms/"+room+"/chat");
const memRef = ref(db,"rooms/"+room+"/memories");
const typingRef = (u)=>ref(db,"rooms/"+room+"/typing/"+u);
const presenceRef = (u)=>ref(db,"rooms/"+room+"/presence/"+u);

/* MENU TOGGLE FIX */
const menuBtn=document.getElementById("menuBtn");
const sideMenu=document.getElementById("sideMenu");

menuBtn.onclick=()=>sideMenu.classList.toggle("open");

document.addEventListener("click",(e)=>{
if(!sideMenu.contains(e.target) && e.target!==menuBtn){
sideMenu.classList.remove("open");
}
});

/* SELECT */
window.selectUser=function(u){

user=u;

document.getElementById("select").style.display="none";
document.getElementById("app").style.display="block";

set(presenceRef(user),{online:true});

onDisconnect(presenceRef(user)).set({online:false});

let other=user==="Melek"?"Gökhan":"Melek";

listenChat();
listenTyping(other);
listenPresence(other);
listenMemories();
}

/* CHAT */
function listenChat(){
onValue(msgRef,(snap)=>{
let data=snap.val();
let box=document.getElementById("messages");
box.innerHTML="";
if(!data) return;

Object.entries(data).forEach(([k,m])=>{
let row=document.createElement("div");
row.className="msgRow "+(m.u===user?"right":"left");

row.innerHTML=`
<div class="name">${m.u}</div>
<div class="bubble ${m.u===user?"meBubble":""}">${m.m}</div>
`;

box.appendChild(row);
});

box.scrollTop=box.scrollHeight;
});
}

/* SEND */
document.getElementById("sendBtn").onclick=()=>{
let t=document.getElementById("text").value.trim();
if(!t||!user)return;

push(msgRef,{u:user,m:t});
document.getElementById("text").value="";
};

/* TYPING */
document.getElementById("text").addEventListener("input",()=>{

if(!user) return;

set(typingRef(user),{t:true});

clearTimeout(window.typingTimer);
window.typingTimer=setTimeout(()=>{
set(typingRef(user),{t:false});
},800);
});

function listenTyping(other){
onValue(typingRef(other),(s)=>{
let d=s.val();
let box=document.getElementById("typing");
let text=document.getElementById("typingText");

if(!d||!d.t){
box.classList.add("hidden");
return;
}

box.classList.remove("hidden");
text.innerText=other+" yazıyor...";
});
}

/* PRESENCE */
function listenPresence(other){
onValue(presenceRef(other),(s)=>{
let d=s.val();
let box=document.getElementById("statusBox");

if(d?.online){
box.innerHTML='<span class="onlineDot"></span>'+other+" çevrimiçi";
}else{
box.innerText=other+" offline";
}
});
}

/* MEMORY SYSTEM */
document.getElementById("addMemory").onclick=()=>{
let text=document.getElementById("memoryInput").value.trim();
if(!text||!user)return;

push(memRef,{
user,
text,
time:new Date().toLocaleString("tr-TR")
});

document.getElementById("memoryInput").value="";
};

function listenMemories(){
onValue(memRef,(snap)=>{
let data=snap.val();
let box=document.getElementById("memoryList");
box.innerHTML="";

if(!data) return;

Object.values(data).forEach(m=>{
let div=document.createElement("div");
div.className="memoryItem";

div.innerHTML=`
<div class="memoryHeader">${m.user} • ${m.time}</div>
<div>${m.text}</div>
`;

box.appendChild(div);
});
});
}

</script>

</body>
</html>
