<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Couple App Stable</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:-apple-system;
background:#0b0f1a;
color:white;
}

/* SELECT */
#select{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background:#0b0f1a;
}

.cardRow{display:flex;gap:20px;}

.card{
width:140px;
padding:20px;
border-radius:16px;
background:rgba(255,255,255,0.08);
cursor:pointer;
text-align:center;
}

/* APP */
#app{display:none;height:100vh;position:relative;}

#messages{
height:100%;
padding:12px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
padding-bottom:140px;
}

.msgRow{display:flex;flex-direction:column;max-width:80%;}
.left{align-self:flex-start;}
.right{align-self:flex-end;}

.name{font-size:11px;opacity:.6;margin-bottom:3px;}

.bubble{
padding:12px;
border-radius:16px;
word-break:break-word;
}

.me{background:#3b82f6;border-bottom-right-radius:5px;}
.other{background:rgba(255,255,255,0.1);border-bottom-left-radius:5px;}

/* INPUT */
#inputBar{
position:fixed;
bottom:10px;
left:10px;
right:10px;
display:flex;
gap:10px;
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:14px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.12);
color:white;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
}

/* STATUS */
#status{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.12);
padding:6px 12px;
border-radius:999px;
font-size:12px;
}

/* TYPING */
#typing{
position:fixed;
bottom:75px;
left:10px;
right:10px;
font-size:13px;
opacity:.8;
}

.hidden{display:none;}

</style>
</head>

<body>

<div id="select">
<h2>💜 Couple App</h2>
<div class="cardRow">
<div class="card" onclick="selectUser('Melek')">👼 Melek</div>
<div class="card" onclick="selectUser('Gökhan')">😎 Gökhan</div>
</div>
</div>

<div id="app">

<div id="status">...</div>

<div id="messages"></div>

<div id="typing" class="hidden">
<span id="typingText"></span>
</div>

<div id="inputBar">
<input id="text" placeholder="Mesaj yaz...">
<button onclick="send()">➤</button>
</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
push,
onValue,
set,
onDisconnect
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"contact-23b7b.firebaseapp.com",
databaseURL:"https://contact-23b7b-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

let room="test";
let user="";

const msgRef = ref(db,"rooms/"+room+"/chat");
const presenceRef = (u)=>ref(db,"rooms/"+room+"/presence/"+u);
const typingRef = (u)=>ref(db,"rooms/"+room+"/typing/"+u);

/* SELECT */
window.selectUser=function(u){

user=u;

document.getElementById("select").style.display="none";
document.getElementById("app").style.display="block";

/* PRESENCE (CLEAN) */
set(presenceRef(user),{online:true});

onDisconnect(presenceRef(user)).set({online:false});

/* LISTEN */
let other = user==="Melek"?"Gökhan":"Melek";
listenPresence(other);
listenTyping(other);
}

/* CHAT */
onValue(msgRef,(s)=>{
let data=s.val();
let box=document.getElementById("messages");
box.innerHTML="";
if(!data) return;

Object.values(data).forEach(m=>{

let row=document.createElement("div");
row.className="msgRow "+(m.u===user?"right":"left");

let n=document.createElement("div");
n.className="name";
n.innerText=m.u;

let b=document.createElement("div");
b.className="bubble "+(m.u===user?"me":"other");
b.innerText=m.m;

row.appendChild(n);
row.appendChild(b);
box.appendChild(row);
});

box.scrollTop=box.scrollHeight;
});

/* SEND */
window.send=function(){
let t=document.getElementById("text").value.trim();
if(!t) return;

push(msgRef,{u:user,m:t});
document.getElementById("text").value="";
}

/* TYPING (STABLE) */
let typingTimeout;

document.getElementById("text").addEventListener("input",()=>{

if(!user) return;

/* sadece timestamp */
set(typingRef(user),Date.now());

clearTimeout(typingTimeout);

typingTimeout=setTimeout(()=>{
set(typingRef(user),0);
},800);

});

/* LISTEN TYPING */
function listenTyping(other){

onValue(typingRef(other),(s)=>{

let t=s.val();
let box=document.getElementById("typing");
let text=document.getElementById("typingText");

if(!t || t===0){
box.classList.add("hidden");
return;
}

let diff=Date.now()-t;

if(diff<2500){
box.classList.remove("hidden");
text.innerText=other+" yazıyor...";
}else{
box.classList.add("hidden");
}

});

}

/* PRESENCE */
function listenPresence(other){

onValue(presenceRef(other),(s)=>{
let d=s.val();
let el=document.getElementById("status");

if(d && d.online){
el.innerText=other+" 🟢 çevrimiçi";
}else{
el.innerText=other+" ⚪ çevrimdışı";
}
});

}

</script>

</body>
</html>
