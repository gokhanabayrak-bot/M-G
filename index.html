<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Couple App Final</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

html,body{
margin:0;
height:100dvh;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont;
background:#0b0f1a;
color:white;
}

/* INPUT ZOOM FIX */
input{ font-size:16px; }

/* SELECT */
#select{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background:#0b0f1a;
z-index:9999;
}

.cardRow{display:flex;gap:20px;}
.card{
width:140px;
padding:20px;
border-radius:16px;
background:rgba(255,255,255,0.08);
cursor:pointer;
text-align:center;
}

/* APP */
#app{display:none;height:100vh;}

/* MENU BUTTON */
#menuBtn{
position:fixed;
top:10px;
left:10px;
z-index:5000;
padding:8px 12px;
background:rgba(255,255,255,0.12);
border-radius:10px;
cursor:pointer;
}

/* SIDE MENU */
#sideMenu{
position:fixed;
top:0;
left:-300px;
width:280px;
height:100%;
background:#111827;
z-index:4500;
padding:15px;
transition:0.25s;
overflow:auto;
}

#sideMenu.open{left:0;}

/* CHAT */
#chat{
height:100%;
display:flex;
flex-direction:column;
padding:12px;
}

#messages{
flex:1;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
padding:40px 4px 120px 4px;
}

/* BUBBLE */
.msgRow{display:flex;flex-direction:column;max-width:80%;}
.left{align-self:flex-start;}
.right{align-self:flex-end;}

.name{font-size:11px;opacity:0.6;margin:0 6px 2px 6px;}

.bubble{
padding:12px 14px;
border-radius:18px;
background:rgba(34,197,94,0.25);
border:1px solid rgba(34,197,94,0.4);
word-wrap:break-word;
}

.meBubble{background:rgba(34,197,94,0.45);}

/* ===================== */
/* MODERN INPUT BAR */
/* ===================== */

#inputBar{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
align-items:center;
gap:10px;
padding:10px;
padding-bottom:calc(10px + env(safe-area-inset-bottom));
background:rgba(15,23,42,0.75);
backdrop-filter:blur(20px);
z-index:5000;
}

/* INPUT */
#text{
flex:1;
padding:14px 16px;
border-radius:999px;
border:none;
outline:none;
background:rgba(255,255,255,0.08);
color:white;
font-size:15px;
transition:0.2s;
}

/* FOCUS */
#text:focus{
background:rgba(255,255,255,0.15);
box-shadow:0 0 0 2px rgba(34,197,94,0.4);
}

/* SEND BUTTON */
#sendBtn{
width:44px;
height:44px;
border-radius:50%;
border:none;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
font-size:18px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.2s;
}

#sendBtn:hover{ transform:scale(1.08); }
#sendBtn:active{ transform:scale(0.95); }

/* ===================== */

/* TYPING */
#typing{
position:fixed;
bottom:85px;
left:10px;
right:10px;
z-index:4000;
}

.hidden{display:none;}

.typingBox{
display:flex;
gap:8px;
padding:10px;
background:rgba(255,255,255,0.1);
border-radius:18px;
width:fit-content;
}

/* STATUS */
#statusBox{
position:fixed;
top:10px;
right:10px;
z-index:5000;
padding:6px 10px;
background:rgba(255,255,255,0.12);
border-radius:999px;
font-size:12px;
}

/* GAME */
#gameTitle{
margin-top:10px;
font-size:14px;
opacity:0.8;
}

#hangWord{
font-size:22px;
letter-spacing:6px;
margin:10px 0;
}

#memoryList div{
background:rgba(255,255,255,0.08);
padding:8px;
border-radius:10px;
margin-top:8px;
}

</style>
</head>

<body>

<div id="menuBtn">☰ Menü</div>

<div id="sideMenu">

<h3>📌 Anı Kutusu</h3>

<input id="memoryInput" placeholder="Anı yaz">
<button id="addMemory">Ekle</button>

<div id="memoryList"></div>

<hr>

<h3>🎮 Adam Asmaca</h3>

<div id="turnInfo">Sıra: ...</div>
<div id="hangWord">_ _ _ _</div>
<div id="hangLives">❤️❤️❤️❤️❤️</div>

<input id="letter" maxlength="1" placeholder="Harf">
<button onclick="guess()">Tahmin</button>

<p id="gameInfo"></p>

</div>

<div id="select">
<h2>💜 Couple App</h2>
<div class="cardRow">
<div class="card" onclick="selectUser('Melek')">👼 Melek</div>
<div class="card" onclick="selectUser('Gökhan')">😎 Gökhan</div>
</div>
</div>

<div id="app">

<div id="statusBox">...</div>

<div id="chat">
<div id="messages"></div>

<div id="typing" class="hidden">
<div class="typingBox">
<span id="typingText"></span>
</div>
</div>

</div>

<!-- MODERN INPUT -->
<div id="inputBar">
<input id="text" placeholder="Mesaj yaz...">
<button id="sendBtn">➤</button>
</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
push,
set,
onValue,
onDisconnect
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBAvlyYU3xJcCJg3sxpv84QcqHhHsc",
authDomain:"contact-23b7b.firebaseapp.com",
databaseURL:"https://contact-23b7b-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

let room="test";
let user="";

const chatRef = ref(db,"rooms/"+room+"/chat");
const gameRef = ref(db,"rooms/"+room+"/game");
const memRef = ref(db,"rooms/"+room+"/memories");
const presenceRef = (u)=>ref(db,"rooms/"+room+"/presence/"+u);

/* MENU FIX */
const menuBtn=document.getElementById("menuBtn");
const sideMenu=document.getElementById("sideMenu");

menuBtn.onclick=(e)=>{
e.stopPropagation();
sideMenu.classList.toggle("open");
};

document.addEventListener("click",(e)=>{
if(!sideMenu.contains(e.target) && !menuBtn.contains(e.target)){
sideMenu.classList.remove("open");
}
});

/* SELECT */
window.selectUser=function(u){
user=u;

document.getElementById("select").style.display="none";
document.getElementById("app").style.display="block";

set(presenceRef(user),{online:true});
onDisconnect(presenceRef(user)).set({online:false});

set(gameRef,{
word:"istanbul",
lives:5,
turn:"Melek",
display:Array(9).fill("_")
});

listenAll();
}

/* LISTEN */
function listenAll(){
listenChat();
listenTyping();
listenGame();
listenMemory();
listenPresence();
}

/* CHAT */
function listenChat(){
onValue(chatRef,(snap)=>{
let data=snap.val();
let box=document.getElementById("messages");
box.innerHTML="";
if(!data) return;

Object.values(data).forEach(m=>{
let row=document.createElement("div");
row.className="msgRow "+(m.u===user?"right":"left");

row.innerHTML=`
<div class="name">${m.u}</div>
<div class="bubble ${m.u===user?"meBubble":""}">${m.m}</div>
`;

box.appendChild(row);
});

box.scrollTop=box.scrollHeight;
});
}

/* SEND */
document.getElementById("sendBtn").onclick=()=>{
let t=document.getElementById("text").value.trim();
if(!t)return;

push(chatRef,{u:user,m:t});
document.getElementById("text").value="";
};

/* TYPING */
document.getElementById("text").addEventListener("input",()=>{

set(ref(db,"rooms/"+room+"/typing/"+user),{t:true});

clearTimeout(window.tp);
window.tp=setTimeout(()=>{
set(ref(db,"rooms/"+room+"/typing/"+user),{t:false});
},800);
});

function listenTyping(){
onValue(ref(db,"rooms/"+room+"/typing"),(snap)=>{
let d=snap.val()||{};
let other=Object.keys(d).find(k=>k!==user && d[k].t);

let box=document.getElementById("typing");
let text=document.getElementById("typingText");

if(!other){
box.classList.add("hidden");
return;
}

box.classList.remove("hidden");
text.innerText=other+" yazıyor...";
});
}

/* PRESENCE */
function listenPresence(){
onValue(ref(db,"rooms/"+room+"/presence"),(snap)=>{
let d=snap.val()||{};
let online=Object.keys(d).filter(k=>d[k].online);

document.getElementById("statusBox").innerText=
"Online: "+online.join(", ");
});
}

/* MEMORY */
document.getElementById("addMemory").onclick=()=>{
let t=document.getElementById("memoryInput").value.trim();
if(!t)return;

push(memRef,{
user,
text:t,
time:new Date().toLocaleString("tr-TR")
});

document.getElementById("memoryInput").value="";
};

function listenMemory(){
onValue(memRef,(snap)=>{
let data=snap.val();
let box=document.getElementById("memoryList");
box.innerHTML="";
if(!data) return;

Object.values(data).forEach(m=>{
let div=document.createElement("div");
div.innerHTML=`<b>${m.user}</b> • ${m.time}<br>${m.text}`;
box.appendChild(div);
});
});
}

/* GAME */
function listenGame(){
onValue(gameRef,(snap)=>{
let g=snap.val();
if(!g) return;

window.game=g;

document.getElementById("hangWord").innerText=g.display.join(" ");
document.getElementById("hangLives").innerText="❤️".repeat(g.lives);
document.getElementById("turnInfo").innerText="Sıra: "+g.turn;
});
}

window.guess=function(){
let l=document.getElementById("letter").value.toLowerCase();
if(!l||!game)return;

if(game.turn!==user){
document.getElementById("gameInfo").innerText="Sıra sende değil!";
return;
}

let found=false;

for(let i=0;i<game.word.length;i++){
if(game.word[i]===l){
game.display[i]=l;
found=true;
}
}

if(!found) game.lives--;

game.turn = game.turn==="Melek"?"Gökhan":"Melek";

set(gameRef,game);

document.getElementById("letter").value="";
};

</script>

</body>
</html>
