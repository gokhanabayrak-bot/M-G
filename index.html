<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Couple App</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

html,body{
margin:0;
height:100%;
width:100%;
overflow:hidden;
position:fixed;
font-family:-apple-system,BlinkMacSystemFont;
background:#0b0f1a;
color:white;
}

/* SELECT */
#select{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background:#0b0f1a;
z-index:999;
}

.cardRow{display:flex;gap:20px;}

.card{
width:140px;
padding:20px;
border-radius:16px;
background:rgba(255,255,255,0.08);
cursor:pointer;
text-align:center;
}

/* APP */
#app{display:none;height:100vh;position:relative;}

#chat{
height:100%;
display:flex;
flex-direction:column;
padding:12px;
}

#messages{
flex:1;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
padding:10px 4px 90px 4px;
}

/* MESSAGE */
.msgRow{
display:flex;
flex-direction:column;
max-width:80%;
}

.left{align-self:flex-start;}
.right{align-self:flex-end;}

.name{
font-size:11px;
opacity:0.6;
margin:0 6px 2px 6px;
}

.bubble{
padding:12px 14px;
border-radius:18px;
font-size:15px;
line-height:1.3;
word-wrap:break-word;
}

.meBubble{
background:linear-gradient(135deg,#3b82f6,#60a5fa);
border-bottom-right-radius:6px;
}

.otherBubble{
background:rgba(255,255,255,0.10);
border-bottom-left-radius:6px;
}

/* TYPING */
#typing{
padding:6px 10px;
}

.hidden{display:none;}

.typingBubble{
display:flex;
align-items:center;
gap:8px;
font-size:13px;
opacity:0.85;
padding:10px 12px;
border-radius:18px;
background:rgba(255,255,255,0.10);
width:fit-content;
}

.dots{
display:flex;
gap:4px;
}

.dots span{
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:0.3;
animation:bounce 1.2s infinite;
}

.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}

@keyframes bounce{
0%,80%,100%{transform:translateY(0);opacity:0.3;}
40%{transform:translateY(-5px);opacity:1;}
}

/* INPUT */
#inputBar{
position:fixed;
bottom:10px;
left:10px;
right:10px;
display:flex;
gap:10px;
padding:10px;
border-radius:16px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
}

input{
flex:1;
padding:14px;
font-size:16px;
border:none;
border-radius:12px;
outline:none;
background:rgba(255,255,255,0.12);
color:white;
}

#sendBtn{
padding:12px 16px;
border:none;
border-radius:12px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
}

/* STATUS */
#status{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:12px;
opacity:0.7;
}

</style>
</head>

<body>

<!-- SELECT -->
<div id="select">
<h2>💜 Couple App</h2>
<div class="cardRow">
<div class="card" onclick="selectUser('Melek')">👼 Melek</div>
<div class="card" onclick="selectUser('Gökhan')">😎 Gökhan</div>
</div>
</div>

<!-- APP -->
<div id="app">

<div id="status"></div>

<div id="chat">
<div id="messages"></div>

<div id="typing" class="hidden">
  <div class="typingBubble">
    <span id="typingText">Yazıyor</span>
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

</div>

<div id="inputBar">
<input id="text" placeholder="Mesaj yaz...">
<button id="sendBtn">➤</button>
</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
push,
onValue,
set,
onDisconnect
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBAvlyYU3xJcCJg3sxpv84QcqHhHsc",
authDomain:"contact-23b7b.firebaseapp.com",
databaseURL:"https://contact-23b7b-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

let room="test";
let user="";

const msgRef = ref(db,"rooms/"+room+"/chat");
const typingRef = ref(db,"rooms/"+room+"/typing");

/* PRESENCE */
const presenceRef = (u)=>ref(db,"rooms/"+room+"/presence/"+u);

/* SELECT USER */
window.selectUser=function(u){

user=u;

document.getElementById("select").style.display="none";
document.getElementById("app").style.display="block";

/* ONLINE */
set(presenceRef(user),{
online:true,
lastSeen:Date.now()
});

/* OFFLINE */
onDisconnect(presenceRef(user)).set({
online:false,
lastSeen:Date.now()
});

/* listen other user */
let other = user==="Melek" ? "Gökhan" : "Melek";
listenPresence(other);
}

/* CHAT */
onValue(msgRef,(snap)=>{
let data=snap.val();
let box=document.getElementById("messages");
box.innerHTML="";
if(!data) return;

Object.values(data).forEach(m=>{

let row=document.createElement("div");
row.className="msgRow "+(m.u===user?"right":"left");

let name=document.createElement("div");
name.className="name";
name.innerText=m.u;

let bubble=document.createElement("div");
bubble.className="bubble "+(m.u===user?"meBubble":"otherBubble");
bubble.innerText=m.m;

row.appendChild(name);
row.appendChild(bubble);

box.appendChild(row);
});

setTimeout(()=>{
box.scrollTop=box.scrollHeight;
},50);

});

/* SEND */
function sendMessage(){
let t=document.getElementById("text").value.trim();
if(!t || !user) return;

push(msgRef,{u:user,m:t});
document.getElementById("text").value="";
}

document.getElementById("sendBtn").onclick=sendMessage;

document.getElementById("text").addEventListener("keydown",(e)=>{
if(e.key==="Enter") sendMessage();
});

/* TYPING */
let typingStartTime=null;
let typingInterval=null;

onValue(typingRef,(s)=>{
let d=s.val();
let box=document.getElementById("typing");
let text=document.getElementById("typingText");

if(!d || d.u===user || !d.t){
box.classList.add("hidden");
typingStartTime=null;
clearInterval(typingInterval);
return;
}

box.classList.remove("hidden");
text.innerText=d.u+" yazıyor";

if(!typingStartTime){
typingStartTime=Date.now();
}

clearInterval(typingInterval);
typingInterval=setInterval(()=>{
let diff=Date.now()-typingStartTime;
if(diff>3000){
text.innerText=d.u+" hâlâ yazıyor... :)";
}
},500);
});

/* PRESENCE UI */
function formatTime(ts){
let diff=Date.now()-ts;
if(diff<60000) return "şimdi aktif";
if(diff<3600000) return Math.floor(diff/60000)+" dk önce";
if(diff<86400000) return Math.floor(diff/3600000)+" saat önce";
return Math.floor(diff/86400000)+" gün önce";
}

function listenPresence(other){
onValue(presenceRef(other),(s)=>{
let d=s.val();
let status=document.getElementById("status");

if(!d){
status.innerText=other+" durumu bilinmiyor";
return;
}

if(d.online){
status.innerText=other+" 🟢 çevrimiçi";
}else{
status.innerText=other+" ⏱ "+formatTime(d.lastSeen);
}
});
}

</script>

</body>
</html>
